theme = 'congo'

enableRobotsTXT = true
summaryLength = 0

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  colorScheme = "ocean"
  defaultAppearance = "light"
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true
  enableImageLazyLoading = true

  [params.header]
    layout = "basic"
    showTitle = true

  [params.footer]
    showCopyright = true
    showThemeAttribution = true

  [params.homepage]
    layout = "profile"

  [params.author]
    name = "xufanchn"
    bio = "代码 · 运维 · 思考 —— 记录技术路上的点滴"
    links = [
      { github = "https://github.com/xufanchn" },
    ]

  [params.article]
    showDate = true
    showReadingTime = true
    showTableOfContents = true
    showAuthor = false
    showWordCount = false

  [params.list]
    showBreadcrumbs = true
    showSummary = true
    showTableOfContents = false

    [params.list.groupByYear]
      enabled = true

[[menu.main]]
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  name = "文章"
  url = "/posts/"
  weight = 2

[[menu.main]]
  name = "GitHub"
  url = "https://github.com/xufanchn"
  weight = 3
